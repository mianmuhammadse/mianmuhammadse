# .github/workflows/update-books.yml
#
# Self-hosted GitHub Action — Apple Books README updater

name: Update Apple Books Stats

on:
  schedule:
    # Runs every day at 08:00 UTC (1 PM PKT)
    - cron: "0 8 * * *"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  update-books:
    name: Fetch & Inject Apple Books Stats
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          ref: main

      - name: Install dependencies
        run: |
          python3 -m pip install py_apple_books --upgrade --quiet --break-system-packages 2>/dev/null || \
          python3 -m pip install py_apple_books --upgrade --quiet

      - name: Fetch Apple Books data
        run: python3 fetch_books.py

      - name: Inject into README
        run: python3 update_readme.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "📚 Update Apple Books reading stats"
            git pull --rebase origin main
            git push
          fi
